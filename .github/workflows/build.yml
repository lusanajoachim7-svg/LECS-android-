name: Build LECS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o *.zip -d .
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
        env:
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Download nodejs-mobile Android AAR
        run: |
          # Tumia version 0.8.1 ambayo bado inafanya kazi na LECS
          curl -L -o nodejs-mobile.zip https://github.com/nodejs-mobile/nodejs-mobile/releases/download/v0.8.1/nodejs-mobile-android-aar-0.8.1.zip
          mkdir -p nodejs-mobile-release
          unzip -o nodejs-mobile.zip -d nodejs-mobile-release
          find nodejs-mobile-release -maxdepth 3

      - name: Place libnode bin/include into the app
        run: |
          mkdir -p app/libnode/bin app/libnode/include
          cp -r nodejs-mobile-release/bin/. app/libnode/bin/
          cp -r nodejs-mobile-release/include/. app/libnode/include/

      - name: Install server dependencies (npm)
        run: |
          cd app/src/main/assets/nodejs-project
          npm ci --omit=dev --legacy-peer-deps
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4g -Dorg.gradle.parallel=true"
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lecs-app-debug
          path: app/build/outputs/apk/debug/*.apk
