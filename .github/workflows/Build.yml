name: Build LECS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o *.zip -d .
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Find and download nodejs-mobile Android release
        run: |
          ASSET_URL=$(curl -s https://api.github.com/repos/nodejs-mobile/nodejs-mobile/releases/tags/nodejs-mobile-v18.20.4 \
            | grep "browser_download_url" | grep -i android | cut -d '"' -f4)
          echo "Downloading: $ASSET_URL"
          curl -L -o nodejs-mobile.zip "$ASSET_URL"
          mkdir -p nodejs-mobile-release
          unzip -o nodejs-mobile.zip -d nodejs-mobile-release
          find nodejs-mobile-release -maxdepth 3

      - name: Place libnode bin/include into the app
        run: |
          mkdir -p app/libnode
          cp -r nodejs-mobile-release/bin app/libnode/bin
          cp -r nodejs-mobile-release/include app/libnode/include
          find app/libnode -maxdepth 3

      - name: Install server dependencies (npm)
        run: |
          cd app/src/main/assets/nodejs-project
          npm install --omit=dev

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lecs-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
