name: Build LECS APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          unzip -o *.zip -d .
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Find and download nodejs-mobile Android release
        run: |
          curl -s https://api.github.com/repos/nodejs-mobile/nodejs-mobile/releases > releases.json
          echo "===== RELEASE TAGS FOUND ====="
          grep '"tag_name"' releases.json
          echo "===== END TAGS ====="
          ASSET_URL=$(grep "browser_download_url" releases.json | grep -i android | head -1 | cut -d '"' -f4)
          echo "Resolved ASSET_URL: [$ASSET_URL]"
          if [ -z "$ASSET_URL" ]; then
            echo "No matching asset found automatically — see the tags printed above."
            exit 1
          fi
          curl -L -o nodejs-mobile.zip "$ASSET_URL"
          mkdir -p nodejs-mobile-release
          unzip -o nodejs-mobile.zip -d nodejs-mobile-release
          find nodejs-mobile-release -maxdepth 3

      - name: Place libnode bin/include into the app
        run: |
          mkdir -p app/libnode/bin app/libnode/include
          cp -r nodejs-mobile-release/bin/. app/libnode/bin/
          cp -r nodejs-mobile-release/include/. app/libnode/include/
          find app/libnode -maxdepth 3

      - name: Install server dependencies (npm)
        run: |
          cd app/src/main/assets/nodejs-project
          npm install --omit=dev

      - name: Install Gradle
        run: |
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.9-bin.zip
          unzip -q gradle.zip -d "$HOME"
          echo "$HOME/gradle-8.9/bin" >> "$GITHUB_PATH"

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lecs-app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
